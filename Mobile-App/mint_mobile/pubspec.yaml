name: mint_mobile
description: MINT - Ministry of Innovation & Technology Mobile App
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.0

  # State management
  provider: ^6.1.5+1

  # Socket.IO
  socket_io_client: ^2.0.3+1

  # Local storage
  shared_preferences: ^2.2.3

  # File & image picking
  image_picker: ^1.1.2
  file_picker: ^8.0.3

  # Emoji Picker
  emoji_picker_flutter: ^4.4.0

  # Agora Video/Voice Call
  agora_rtc_engine: ^6.3.2

  # Permissions
  permission_handler: ^11.3.1

  # Audio recording
  record: ^6.2.1

  # Path helper (for saving files)
  path_provider: ^2.1.3

  # File opening
  open_filex: ^4.4.1

  # Network images
  cached_network_image: ^3.3.1

  # Date formatting
  intl: ^0.19.0

  # Progress indicators
  percent_indicator: ^4.2.3

  # Icons
  cupertino_icons: ^1.0.6
  mime: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
